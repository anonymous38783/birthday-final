<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#ff4d6d,#ff99ac);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
text-align:center;
filter:sepia(.25) contrast(1.1) brightness(.95);
}

/* 🎞 film grain */
.film-grain{
position:fixed;
width:100%;height:100%;
pointer-events:none;
opacity:.15;
z-index:999;
background:url("https://www.transparenttextures.com/patterns/asfalt-light.png");
animation:grain .3s infinite;
}
@keyframes grain{
0%{transform:translate(0,0);}
50%{transform:translate(2%,-2%);}
100%{transform:translate(-2%,2%);}
}

/* 🌑 vignette */
.vignette{
position:fixed;
width:100%;height:100%;
box-shadow:inset 0 0 150px rgba(0,0,0,.4);
z-index:998;
pointer-events:none;
}

/* 🌟 particles */
.spark{
position:absolute;
width:6px;height:6px;
background:white;
border-radius:50%;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);opacity:0;}
}

/* 🎁 gift */
.gift-box{
width:160px;height:160px;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{transform:translate(-50%,-50%) scale(1.05);}
}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
width:100%;height:50px;
background:#ff1f4b;
position:absolute;top:-50px;
border-radius:15px;
transition:.8s;
}
.opened .lid{transform:translateY(-140px) rotate(-25deg);}

/* ✉️ envelope */
.envelope{
width:320px;height:220px;
background:white;
border-radius:12px;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(.8);
opacity:0;
transition:1s;
}
.show-envelope{opacity:1;transform:translate(-50%,-50%) scale(1);}

.flap{
border-left:160px solid transparent;
border-right:160px solid transparent;
border-bottom:110px solid #ff4d6d;
position:absolute;top:0;
transform-origin:top;
transition:1s;
}
.letter{
position:absolute;
width:90%;height:90%;
background:white;
color:#ff4d6d;
top:5%;left:5%;
border-radius:10px;
padding:20px;
transform:translateY(100%);
transition:1s;
}
.open .flap{transform:rotateX(180deg);}
.open .letter{transform:translateY(0);}

/* 💖 name */
#name{animation:fadeIn 2s forwards 1s;}
@keyframes fadeIn{to{opacity:1;}}

/* 🎞 photostrip */
.photostrip{
position:absolute;
right:30px;top:50%;
transform:translateY(-50%) rotate(3deg);
background:#111;
padding:10px;
border-radius:10px;
}
.photostrip img{
width:120px;
display:block;
margin-bottom:10px;
border:5px solid white;
}

/* 🎆 fireworks */
.firework{
position:absolute;
width:5px;height:5px;
background:white;border-radius:50%;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<div class="gift-box" onclick="openGift()">
<div class="lid"></div>
<div class="box"></div>
</div>

<div class="envelope">
<div class="flap"></div>
<div class="letter">
<h2 id="name">For My Love 💖</h2>
<div id="message"></div>
</div>
</div>

<!-- 🎞 photos -->
<div class="photostrip">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

<!-- 🎵 music -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="vignette"></div>
<div class="film-grain"></div>

<script>
/* particles */
setInterval(()=>{
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},200);

/* message */
const text=`Happy Birthday my love 💖
You are my everything ✨`;

let i=0;
function startTyping(){
let el=document.getElementById("message");
function type(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(type,30);
}}
type();
}

/* music fade */
function fadeMusic(a){
a.volume=0;a.play();
let v=0;
let f=setInterval(()=>{
if(v<1){v+=0.05;a.volume=v;}
else clearInterval(f);
},200);
}

/* open gift */
function openGift(){
let g=document.querySelector(".gift-box");
let e=document.querySelector(".envelope");
let m=document.getElementById("bgMusic");

g.classList.add("opened");

for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left="50%";
f.style.top="50%";
f.style.setProperty('--x',(Math.random()-0.5)*300+"px");
f.style.setProperty('--y',(Math.random()-0.5)*300+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

setTimeout(()=>{
g.style.display="none";
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
startFireworks();
},800);

},900);

fadeMusic(m);
}

/* fireworks loop */
function startFireworks(){
setInterval(()=>{
for(let i=0;i<15;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
f.style.setProperty('--x',(Math.random()-0.5)*200+"px");
f.style.setProperty('--y',(Math.random()-0.5)*200+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
},1000);
}
</script>

</body>
</html>
