<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff99ac);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
filter:sepia(.25) contrast(1.1) brightness(.95);
}

/* 🎞 film grain */
.film-grain{
position:fixed;
width:100%;height:100%;
pointer-events:none;
opacity:.15;
z-index:999;
background:url("https://www.transparenttextures.com/patterns/asfalt-light.png");
animation:grain .3s infinite;
}
@keyframes grain{
0%{transform:translate(0,0);}
50%{transform:translate(2%,-2%);}
100%{transform:translate(-2%,2%);}
}

/* 🌑 vignette */
.vignette{
position:fixed;
width:100%;height:100%;
box-shadow:inset 0 0 150px rgba(0,0,0,.4);
z-index:998;
pointer-events:none;
}

/* 🌟 particles */
.spark{
position:absolute;
width:6px;height:6px;
background:white;
border-radius:50%;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);opacity:0;}
}

/* 🎬 MAIN LAYOUT */
.main-scene{
display:flex;
align-items:center;
gap:50px;
}

/* 🎁 gift */
.gift-box{
width:160px;
height:160px;
cursor:pointer;
position:relative;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{transform:scale(1.05);}
}
.box{
width:100%;
height:100%;
background:#ff4d6d;
border-radius:15px;
}
.lid{
width:100%;
height:50px;
background:#ff1f4b;
position:absolute;
top:-50px;
border-radius:15px;
transition:.8s;
}
.opened .lid{
transform:translateY(-140px) rotate(-25deg);
}

/* ✉️ envelope */
.envelope{
width:320px;
height:220px;
background:white;
border-radius:12px;
position:relative;
transform:scale(.8);
opacity:0;
transition:1s ease;
}
.show-envelope{
opacity:1;
transform:scale(1);
}

.flap{
border-left:160px solid transparent;
border-right:160px solid transparent;
border-bottom:110px solid #ff4d6d;
position:absolute;
top:0;
transform-origin:top;
transition:1s;
}
.letter{
position:absolute;
width:90%;
height:90%;
background:white;
color:#ff4d6d;
top:5%;
left:5%;
border-radius:10px;
padding:20px;
transform:translateY(100%);
transition:1s;
overflow:hidden;
}
.open .flap{transform:rotateX(180deg);}
.open .letter{transform:translateY(0);}

/* 💖 text */
#name{
opacity:0;
animation:fadeIn 2s forwards 1s;
}
@keyframes fadeIn{to{opacity:1;}}

/* 🎞 photostrip */
.photostrip{
background:#111;
padding:12px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transform:rotate(4deg);
}
.photostrip img{
width:120px;
display:block;
margin-bottom:12px;
border:6px solid white;
}

/* 🎆 fireworks */
.firework{
position:absolute;
width:5px;height:5px;
background:white;
border-radius:50%;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<div class="main-scene">

    <!-- 🎁 Gift -->
    <div class="gift-box" onclick="openGift()">
        <div class="lid"></div>
        <div class="box"></div>
    </div>

    <!-- ✉️ Envelope -->
    <div class="envelope">
        <div class="flap"></div>
        <div class="letter">
            <h2 id="name">For My Jeppyy 💖</h2>
            <div id="message"></div>
        </div>
    </div>

    <!-- 🎞 Photos -->
    <div class="photostrip">
        <img src="jef1.jpeg">
        <img src="jef2.jpeg">
        <img src="jef3.jpeg">
    </div>

</div>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="vignette"></div>
<div class="film-grain"></div>

<script>
/* particles */
setInterval(()=>{
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},200);

/* message */
const text=`Happy Birthday my love 💖
You are my everything ✨`;

let i=0;
function startTyping(){
let el=document.getElementById("message");
el.innerHTML="";
i=0;
function type(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(type,30);
}}
type();
}

/* 🎵 cinematic music */
function cinematicMusic(a){
a.volume=0;
a.currentTime=12;
a.play().catch(()=>{});

let v=0;
let fade=setInterval(()=>{
if(v<1){
v+=0.02;
a.volume=v;
}else clearInterval(fade);
},300);
}

/* 🎁 open gift */
function openGift(){
let g=document.querySelector(".gift-box");
let e=document.querySelector(".envelope");
let m=document.getElementById("bgMusic");

g.classList.add("opened");
cinematicMusic(m);

/* glow */
document.body.style.transition="0.5s";
document.body.style.filter="brightness(1.2) sepia(.25)";
setTimeout(()=>{
document.body.style.filter="sepia(.25) contrast(1.1) brightness(.95)";
},500);

/* burst */
for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left="50%";
f.style.top="50%";
f.style.setProperty('--x',(Math.random()-0.5)*300+"px");
f.style.setProperty('--y',(Math.random()-0.5)*300+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

/* show envelope */
setTimeout(()=>{
g.style.display="none";
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
startFireworks();
},800);

},900);
}

/* fireworks loop */
function startFireworks(){
setInterval(()=>{
for(let i=0;i<15;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
f.style.setProperty('--x',(Math.random()-0.5)*200+"px");
f.style.setProperty('--y',(Math.random()-0.5)*200+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
},1000);
}
</script>

</body>
</html>
