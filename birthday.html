<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6f91,#ffc3a0);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
}

/* 💖 HEARTS BACKGROUND */
.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}
.heart{
position:absolute;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:.8;
filter:blur(.3px);
}
@keyframes floatUp{
0%{transform:translateY(0) scale(.8);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-110vh) scale(1.4);opacity:0;}
}

/* 🎬 layout */
.main-scene{
display:flex;
align-items:center;
gap:40px;
flex-wrap:wrap;
justify-content:center;
z-index:2;
}

/* 🎁 gift */
.gift-box{
width:130px;height:130px;
cursor:pointer;
position:relative;
animation:pulse 2s infinite;
}
@keyframes pulse{50%{transform:scale(1.08);}}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
width:100%;height:40px;
background:#ff1f4b;
position:absolute;top:-40px;
border-radius:15px;
transition:.8s;
}
.opened .lid{transform:translateY(-110px) rotate(-25deg);}

/* ✉️ envelope */
.envelope{
width:300px;
max-width:90vw;
height:190px;
background:#fff;
border-radius:10px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
overflow:hidden;
transform:scale(.85);
opacity:0;
transition:1s;
}
.show-envelope{opacity:1;transform:scale(1);}

.envelope::before{
content:"";
position:absolute;
bottom:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:95px solid #ffe6ea;
}

.flap{
position:absolute;
top:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-bottom:95px solid #ff4d6d;
transform-origin:top;
transition:1s;
z-index:2;
}

.letter{
position:absolute;
width:90%;
height:90%;
top:5%;
left:5%;
background:#fff;
color:#ff4d6d;
border-radius:8px;
padding:16px;
transform:translateY(100%);
transition:1s;
overflow:auto;
font-size:14px;
line-height:1.6;
}
.envelope.open .flap{transform:rotateX(180deg);}
.envelope.open .letter{transform:translateY(0);}

/* 🎞 photostrip (SLANTED) */
.photostrip{
background:#111;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transform:rotate(8deg);
}
.photostrip img{
width:95px;
display:block;
margin-bottom:10px;
border:5px solid white;
}

/* 📱 mobile */
@media(max-width:768px){
.main-scene{flex-direction:column;}
.photostrip{transform:rotate(3deg);}
}

/* 🎵 hidden audio */
audio{display:none;}
</style>
</head>

<body>

<!-- 💖 HEARTS -->
<div class="hearts" id="hearts"></div>

<div class="main-scene">

<div class="gift-box" onclick="openGift()">
<div class="lid"></div>
<div class="box"></div>
</div>

<div class="envelope">
<div class="flap"></div>
<div class="letter">
<h2>For My Jeppyy Kuttan 💖</h2>
<div id="message"></div>
</div>
</div>

<div class="photostrip">
<img src="jef1.jpeg">
<img src="jef2.jpeg">
<img src="jef3.jpeg">
</div>

</div>

<audio id="bgMusic" loop>
<source src="untilifoundu.mp3" type="audio/mpeg">
</audio>

<script>

/* 💖 MANY HEARTS */
const heartContainer = document.getElementById("hearts");
const heartIcons = ["💖","💕","💗","💋"];

for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=heartIcons[Math.floor(Math.random()*heartIcons.length)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(14+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*4)+"s";
h.style.animationDelay=(Math.random()*5)+"s";
heartContainer.appendChild(h);
}

/* 💌 MESSAGE */
const text=`Happy Birthday my love 💖

YOU'RE 17 NOW!!! how cool is that!!
I wish i was there to celebrate with you, 
i wouldve given you an actual gift man.
I miss you sm, Im sorry that this is all
i could give u but i tried rllyy hard to
mark it cute nd pretty like u deserve.
I love you sm and theres nothing i wouldnt 
do for you. 
I dont think i could ever tell you how much 
i love you but if we stay together i'd spend
my whole life showing you how much I 
love you and how much you matter to me
You're one of the best people ik and im so grateful
that you still keep up with all my shit.
I hope for one of your bdays ill be able 
to throw you a big party with all the people
you love and give you so manyy gifts.
You're my best friend and my person.
I could write about you for hours,
There's sm i love about you and 
everytime i learn something else 
about you, i love you sm.
For a year i was dreaming about seeing you,
sometimes i just look at the pics and i 
cant stop crying lol.
I wish i was there with you right now
I know how stressful school, tuition 
and stuff is for you, if i could i 
would hug you and make all your
problems go away and keep you with
me foreverrr 😭.
I miss you more than i can say.


`;

let i=0;
function startTyping(){
let el=document.getElementById("message");
el.innerHTML="";
i=0;
function type(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(type,25);
}}
type();
}

/* 🎵 MUSIC (STABLE) */
let started=false;
function cinematicMusic(){
if(started) return;
started=true;

const audio=document.getElementById("bgMusic");
audio.volume=0;

audio.play().then(()=>{
let v=0;
let fade=setInterval(()=>{
if(v<1){v+=0.02;audio.volume=v;}
else clearInterval(fade);
},200);
}).catch(()=>{
alert("Tap again 💖");
});
}

/* 🎁 OPEN */
function openGift(){
const g=document.querySelector(".gift-box");
const e=document.querySelector(".envelope");

g.classList.add("opened");
cinematicMusic();

setTimeout(()=>{
g.style.display="none";
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
},600);

},700);
}
</script>

</body>
</html>
