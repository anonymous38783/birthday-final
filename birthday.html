<!DOCTYPE html>
<html>
<head>
<title>For My Jeppyyy 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6f91,#ffc3a0);
font-family:'Quicksand',sans-serif;
overflow:hidden;
}

/* 💖 hearts */
.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}
.heart{
position:absolute;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:.8;
}
@keyframes floatUp{
0%{transform:translateY(0) scale(.8);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* layout */
.container{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* gift */
.gift-box{
width:130px;height:130px;
cursor:pointer;
animation:pulse 2s infinite;
position:relative;
z-index:3;
}
@keyframes pulse{50%{transform:scale(1.08);}}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
height:40px;background:#ff1f4b;
position:absolute;top:-40px;width:130px;
border-radius:15px;transition:.8s;
}
.opened .lid{transform:translateY(-120px) rotate(-25deg);}

/* envelope */
.envelope{
width:520px;
height:340px;
max-width:95vw;
background:linear-gradient(145deg,#fff,#ffe6ea);
border-radius:16px;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,0.35);
overflow:hidden;
transform:scale(.85) rotateX(8deg);
opacity:0;
transition:1s;
z-index:2;
}
.show-envelope{
opacity:1;
transform:scale(1) rotateX(0);
}

.envelope.open{
transform:scale(1.1);
box-shadow: 0 0 60px rgba(255,105,180,0.6), 0 30px 80px rgba(0,0,0,0.35);
}

.envelope::before{
content:"";
position:absolute;
bottom:0;
border-left:260px solid transparent;
border-right:260px solid transparent;
border-top:170px solid #ffe6ea;
}
.flap{
position:absolute;
top:0;
border-left:260px solid transparent;
border-right:260px solid transparent;
border-bottom:170px solid #ff4d6d;
transform-origin:top;
transition:1s;
z-index:2;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* letter */
.letter{
position:absolute;
width:92%;
height:92%;
top:4%;
left:4%;
background:rgba(255,255,255,0.97);
color:#d6336c;
border-radius:12px;
padding:25px;
transform:translateY(120%) scale(.9);
transition:1s;
overflow:auto;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
backdrop-filter: blur(6px);
}
.envelope.open .letter{
transform:translateY(-15%) scale(1.05);
}

.letter h2{
font-family:'Great Vibes',cursive;
font-size:36px;
text-align:center;
margin-bottom:15px;
color:#ff4d6d;
}

#message{
line-height:1.9;
font-size:15px;
letter-spacing:0.4px;
color:#b03060;
white-space:pre-line;
}

/* photostrip side */
.photostrip{
position:absolute;
left:calc(50% + 300px);
top:50%;
transform:translateY(-50%) rotate(6deg);
z-index:1;

background:#111;
padding:10px;
border-radius:14px;

box-shadow: 
0 10px 25px rgba(0,0,0,0.4),
0 0 15px rgba(255,182,193,0.2);

opacity:0;
transition:1s ease;
}

.envelope.open ~ .photostrip{
opacity:1;
animation: float 4s ease-in-out infinite;
}

.photostrip::before{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(-5deg);
width:60px;
height:18px;
background:rgba(255,255,255,0.4);
border-radius:5px;
}

.photostrip img{
width:105px;
display:block;
margin-bottom:10px;
border:5px solid white;
border-bottom:18px solid white;
border-radius:8px;
box-shadow:0 8px 18px rgba(0,0,0,0.35);

opacity:0;
transform:scale(0.8);
animation: popIn 0.6s forwards;
}

.photostrip img:nth-child(1){ transform:rotate(-3deg); animation-delay:0.3s; }
.photostrip img:nth-child(2){ transform:rotate(2deg); animation-delay:0.6s; }
.photostrip img:nth-child(3){ transform:rotate(-2deg); animation-delay:0.9s; }

@keyframes popIn{
to{opacity:1; transform:scale(1);}
}

@keyframes float{
0%,100%{ transform: translateY(-50%) rotate(6deg); }
50%{ transform: translateY(calc(-50% - 10px)) rotate(6deg); }
}

/* mobile */
@media (max-width:768px){
.photostrip{
left:50%;
top:78%;
transform:translate(-50%,-50%) rotate(4deg);
}
.envelope.open ~ .photostrip{
transform:translate(-50%,-50%) rotate(4deg);
opacity:1;
}
.photostrip img{width:80px;}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<div class="gift-box" onclick="openGift()">
  <div class="lid"></div>
  <div class="box"></div>
</div>

<div class="envelope">
  <div class="flap"></div>
  <div class="letter">
    <h2>Happy 17th Birthdayyy Jeppyy Kuttaa 💖</h2>

<div class="photostrip">

  <img src="jef3.jpeg">

</div>

<audio id="bgMusic" loop>
<source src="untilifoundu.mp3" type="audio/mpeg">
</audio>

let i=0;
function startTyping(){
let el=document.getElementById("message");
el.textContent="";
function type(){
if(i<text.length){
el.textContent+=text[i++];
setTimeout(type,25);
}}
type();
}

let started=false;
function music(){
if(started) return;
started=true;
let a=document.getElementById("bgMusic");
a.volume=0;
a.play().then(()=>{
let v=0;
let f=setInterval(()=>{
if(v<1){v+=.02;a.volume=v;} else clearInterval(f);
},200);
});
}

function openGift(){
document.querySelector(".gift-box").classList.add("opened");
music();

setTimeout(()=>{
document.querySelector(".gift-box").style.display="none";
let e=document.querySelector(".envelope");
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
},600);

},700);
}
</script>

</body>
</html>
