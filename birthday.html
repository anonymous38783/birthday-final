<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6f91,#ffc3a0);
font-family:'Quicksand',sans-serif;
overflow:hidden;
}

/* 💖 floating hearts */
.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}
.heart{
position:absolute;
bottom:-20px;
font-size:18px;
animation:floatUp linear infinite;
opacity:.8;
}
@keyframes floatUp{
0%{transform:translateY(0) scale(.8);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* 🎬 layout */
.container{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* 🎁 gift */
.gift-box{
width:130px;height:130px;
cursor:pointer;
animation:pulse 2s infinite;
position:relative;
z-index:3;
}
@keyframes pulse{50%{transform:scale(1.08);}}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
height:40px;background:#ff1f4b;
position:absolute;top:-40px;width:130px;
border-radius:15px;transition:.8s;
}
.opened .lid{transform:translateY(-120px) rotate(-25deg);}

/* ✉️ envelope */
.envelope{
width:520px;
height:340px;
max-width:95vw;
background:linear-gradient(145deg,#fff,#ffe6ea);
border-radius:16px;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,0.35);
overflow:hidden;
transform:scale(.85) rotateX(8deg);
opacity:0;
transition:1s;
z-index:2;
}
.show-envelope{
opacity:1;
transform:scale(1) rotateX(0);
}

.envelope::before{
content:"";
position:absolute;
bottom:0;
border-left:260px solid transparent;
border-right:260px solid transparent;
border-top:170px solid #ffe6ea;
}
.flap{
position:absolute;
top:0;
border-left:260px solid transparent;
border-right:260px solid transparent;
border-bottom:170px solid #ff4d6d;
transform-origin:top;
transition:1s;
z-index:2;
}

/* 💌 letter */
.letter{
position:absolute;
width:92%;
height:92%;
top:4%;
left:4%;
background:rgba(255,255,255,0.97);
color:#d6336c;
border-radius:12px;
padding:25px;
transform:translateY(120%) scale(.9);
transition:1s;
overflow:auto;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.letter h2{
font-family:'Great Vibes',cursive;
font-size:36px;
text-align:center;
margin-bottom:15px;
color:#ff4d6d;
}

#message{
line-height:1.9;
font-size:15px;
letter-spacing:0.4px;
color:#b03060;
white-space:pre-line;
}

.envelope.open{
transform:scale(1.1);
}
.envelope.open .flap{
transform:rotateX(180deg);
}
.envelope.open .letter{
transform:translateY(-15%) scale(1.05);
}

/* 📸 photostrip */
.photostrip{
position:absolute;
right:3%;
top:58%;
transform:translateY(-50%) rotate(9deg);
z-index:5;

background:#111;
padding:12px;
border-radius:14px;

box-shadow: 
0 10px 25px rgba(0,0,0,0.4),
0 0 15px rgba(255,182,193,0.2);

animation: float 4s ease-in-out infinite;
}

.photostrip::before{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(-5deg);
width:70px;
height:22px;
background:rgba(255,255,255,0.4);
border-radius:5px;
}

.photostrip img{
width:95px;
display:block;
margin-bottom:12px;
border:6px solid white;
border-bottom:18px solid white;
border-radius:6px;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
transition:.3s;
}

.photostrip img:nth-child(1){ transform:rotate(-3deg); }
.photostrip img:nth-child(2){ transform:rotate(2deg); }
.photostrip img:nth-child(3){ transform:rotate(-2deg); }
.photostrip img:nth-child(4){ transform:rotate(3deg); }

.photostrip img:hover{
transform:scale(1.05) rotate(0deg);
}

@keyframes float{
0%,100%{ transform: translateY(-50%) rotate(9deg); }
50%{ transform: translateY(calc(-50% - 10px)) rotate(9deg); }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<div class="gift-box" onclick="openGift()">
  <div class="lid"></div>
  <div class="box"></div>
</div>

<div class="envelope">
  <div class="flap"></div>
  <div class="letter">
    <h2>Happy Birthday 💖</h2>
    <p id="message"></p>
  </div>
</div>

<div class="photostrip">
  <img src="jef1.jpg">
  <img src="jef2.jpg">
  <img src="jef3.jpg">
  <img src="jef4.jpg">
</div>

</div>

<audio id="bgMusic" loop>
<source src="untilifoundu.mp3" type="audio/mpeg">
</audio>

<script>

/* hearts */
const c=document.getElementById("hearts");
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","💗","💋"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
c.appendChild(h);
}

/* 💌 original message */
const text=`Happy Birthday my love 💖

YOU'RE 17 NOW!!! how cool is that!!
I wish i was there to celebrate with you, 
i wouldve given you an actual gift man.
I miss you sm, Im sorry that this is all
i could give u but i tried rllyy hard to
mark it cute nd pretty like u deserve.
I love you sm and theres nothing i wouldnt 
do for you. 
I dont think i could ever tell you how much 
i love you but if we stay together i'd spend
my whole life showing you how much I 
love you and how much you matter to me
You're one of the best people ik and im 
so grateful that you still keep up with all 
my shit.
I hope for one of your bdays ill be able 
to throw you a big party with all the people
you love and give you so manyy gifts.
You're my best friend and my person.
I could write about you for hours,
There's sm i love about you and 
everytime i learn something else 
about you, i love you sm.
For a year i was dreaming about seeing you,
sometimes i just look at the pics and i 
cant stop crying lol.
I wish i was there with you right now
I know how stressful school, tuition 
and stuff is for you, if i could i 
would hug you and make all your
problems go away and keep you with
me foreverrr 😭.
I miss you more than i can say. 
I think this is ur 3rd birthday from
when we started dating.
Ik our relationship isnt perfect and tht
its hard to deal with me but im so 
happy you do it everyday baby.
`;

let i=0;
function startTyping(){
let el=document.getElementById("message");
el.textContent="";
function type(){
if(i<text.length){
el.textContent+=text[i++];
setTimeout(type,25);
}}
type();
}

/* music */
let started=false;
function music(){
if(started) return;
started=true;
let a=document.getElementById("bgMusic");
a.volume=0;
a.play().then(()=>{
let v=0;
let f=setInterval(()=>{
if(v<1){v+=.02;a.volume=v;} else clearInterval(f);
},200);
});
}

/* open */
function openGift(){
document.querySelector(".gift-box").classList.add("opened");
music();

setTimeout(()=>{
document.querySelector(".gift-box").style.display="none";
let e=document.querySelector(".envelope");
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
},600);

},700);
}
</script>

</body>
</html>
