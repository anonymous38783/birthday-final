<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff99ac);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
padding:20px;
}

/* layout */
.main-scene{
display:flex;
align-items:center;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

/* gift */
.gift-box{
width:130px;height:130px;
cursor:pointer;
position:relative;
animation:pulse 2s infinite;
}
@keyframes pulse{50%{transform:scale(1.05);}}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
width:100%;height:40px;
background:#ff1f4b;
position:absolute;top:-40px;
border-radius:15px;
transition:.8s;
}
.opened .lid{transform:translateY(-110px) rotate(-25deg);}

/* envelope */
.envelope{
width:300px;
max-width:90vw;
height:190px;
background:#fff;
border-radius:10px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
overflow:hidden;
transform:scale(.85);
opacity:0;
transition:1s ease;
}
.show-envelope{opacity:1;transform:scale(1);}

.envelope::before{
content:"";
position:absolute;
bottom:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:95px solid #ffe6ea;
}

.flap{
position:absolute;
top:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-bottom:95px solid #ff4d6d;
transform-origin:top;
transition:1s;
z-index:2;
}

.letter{
position:absolute;
width:90%;
height:90%;
top:5%;
left:5%;
background:#fff;
color:#ff4d6d;
border-radius:8px;
padding:16px;
transform:translateY(100%);
transition:1s;
overflow:auto;
font-size:14px;
line-height:1.5;
}

.envelope.open .flap{transform:rotateX(180deg);}
.envelope.open .letter{transform:translateY(0);}

/* photostrip */
.photostrip{
background:#111;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}
.photostrip img{
width:95px;
display:block;
margin-bottom:10px;
border:5px solid white;
}

/* mobile */
@media(max-width:768px){
.main-scene{flex-direction:column;}
}

/* effects */
.spark{
position:absolute;
width:5px;height:5px;
background:white;
border-radius:50%;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);opacity:0;}
}

.firework{
position:absolute;
width:5px;height:5px;
background:white;border-radius:50%;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<div class="main-scene">

<!-- 🎁 Gift -->
<div class="gift-box" onclick="openGift()">
<div class="lid"></div>
<div class="box"></div>
</div>

<!-- ✉️ Envelope -->
<div class="envelope">
<div class="flap"></div>
<div class="letter">
<h2>For My Love 💖</h2>
<div id="message"></div>
</div>
</div>

<!-- 🎞 Photos -->
<div class="photostrip">
<img src="jef1.jpeg">
<img src="jef2.jpeg">
<img src="jef3.jpeg">
</div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop >
<source src="untilifoundu.mp3" type="audio/mpeg">
</audio>

<script>



/* 💌 MESSAGE */
const text = `Happy Birthday my love 💖

You are my happiness, my peace, and my everything ✨
Every moment with you means the world to me 💕

I will always choose you, again and again 💌`;

let i = 0;
function startTyping(){
    let el = document.getElementById("message");
    el.innerHTML = "";
    i = 0;

    function type(){
        if(i < text.length){
            el.innerHTML += text[i++];
            setTimeout(type, 25);
        }
    }
    type();
}

/* 🎵 ULTRA STABLE MUSIC */
let started = false;

function cinematicMusic(){
    if(started) return;
    started = true;

    const audio = document.getElementById("bgMusic");

    audio.pause();          // reset
    audio.currentTime = 0;  // start from beginning
    audio.volume = 0;

    audio.play().then(() => {

        let v = 0;
        const fade = setInterval(() => {
            if(v < 1){
                v += 0.03;
                audio.volume = v;
            } else {
                clearInterval(fade);
            }
        }, 200);

    }).catch(() => {
        alert("Tap again 💖 (browser needs interaction)");
    });
}

/* 🎁 OPEN GIFT */
function openGift(){

    const gift = document.querySelector(".gift-box");
    const envelope = document.querySelector(".envelope");

    gift.classList.add("opened");

    cinematicMusic(); // ✅ safe call

    setTimeout(() => {
        gift.style.display = "none";
        envelope.classList.add("show-envelope");

        setTimeout(() => {
            envelope.classList.add("open"); // ✅ correct
            startTyping();
        }, 600);

    }, 700);
}

</script>

</body>
</html>
