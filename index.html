<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<style>
body {
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#ff4d6d,#ff99ac);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    color:white;
}

.container{
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.display{
    font-size:28px;
    letter-spacing:10px;
    margin-bottom:20px;
}

.keypad{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:10px;
}

.key{
    background:white;
    color:#ff4d6d;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
}

.key:hover{transform:scale(1.1);background:#ffe6ea;}
</style>
</head>

<body>

<div class="container">
<h2>Enter the Secret 💌</h2>
<div class="display" id="display">••••</div>

<div class="keypad">
<div class="key" onclick="press('1')">1</div>
<div class="key" onclick="press('2')">2</div>
<div class="key" onclick="press('3')">3</div>
<div class="key" onclick="press('4')">4</div>
<div class="key" onclick="press('5')">5</div>
<div class="key" onclick="press('6')">6</div>
<div class="key" onclick="press('7')">7</div>
<div class="key" onclick="press('8')">8</div>
<div class="key" onclick="press('9')">9</div>
<div class="key" onclick="clearPass()">⌫</div>
<div class="key" onclick="press('0')">0</div>
<div class="key" onclick="check()">✔</div>
</div>
</div>

<script>
let input="";
const password="1234"; // change

function press(n){
 if(input.length<4){input+=n;update();}
}
function clearPass(){
 input=input.slice(0,-1);update();
}
function update(){
 document.getElementById("display").innerText="•".repeat(input.length).padEnd(4,"•");
}
function check(){
 if(input===password){
  window.location.href="birthday.html";
 }else{
  alert("Wrong password 💔");
  input="";update();
 }
}
</script>

</body>
</html>
