<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff99ac);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
filter:sepia(.25) contrast(1.1) brightness(.95);
padding:20px;
}

/* 🎬 layout */
.main-scene{
display:flex;
align-items:center;
gap:50px;
flex-wrap:wrap;
justify-content:center;
}

/* 🎁 gift */
.gift-box{
width:140px;height:140px;
cursor:pointer;
position:relative;
animation:pulse 2s infinite;
}
@keyframes pulse{50%{transform:scale(1.05);}}
.box{width:100%;height:100%;background:#ff4d6d;border-radius:15px;}
.lid{
width:100%;height:45px;
background:#ff1f4b;
position:absolute;top:-45px;
border-radius:15px;
transition:.8s;
}
.opened .lid{transform:translateY(-120px) rotate(-25deg);}

/* ✉️ envelope */
.envelope{
width:320px;
max-width:90vw;
height:200px;
background:#fff;
border-radius:10px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
overflow:hidden;
transform:scale(.85);
opacity:0;
transition:1s ease;
}
.show-envelope{opacity:1;transform:scale(1);}

/* bottom fold */
.envelope::before{
content:"";
position:absolute;
bottom:0;
left:0;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:100px solid #ffe6ea;
}

/* flap */
.flap{
position:absolute;
top:0;
left:0;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-bottom:100px solid #ff4d6d;
transform-origin:top;
transition:1s;
z-index:2;
}

/* 💌 letter */
.letter{
position:absolute;
width:90%;
height:90%;
top:5%;
left:5%;
background:linear-gradient(#fff,#fff5f7);
color:#ff4d6d;
border-radius:8px;
padding:18px;
transform:translateY(100%);
transition:1s;
z-index:1;
overflow:auto;
font-size:14px;
line-height:1.5;
}
.open .flap{transform:rotateX(180deg);}
.open .letter{transform:translateY(0);}

/* 🎞 photostrip */
.photostrip{
background:#111;
padding:10px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transform:rotate(3deg);
}
.photostrip img{
width:100px;
display:block;
margin-bottom:10px;
border:5px solid white;
}

/* 📱 MOBILE FIX */
@media (max-width:768px){
.main-scene{
flex-direction:column;
gap:25px;
}
.photostrip{
transform:none;
}
}

/* ✨ particles */
.spark{
position:absolute;
width:5px;height:5px;
background:white;
border-radius:50%;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);opacity:0;}
}

/* 🎆 fireworks */
.firework{
position:absolute;
width:5px;height:5px;
background:white;border-radius:50%;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* 🎞 film grain */
.film-grain{
position:fixed;
width:100%;height:100%;
pointer-events:none;
opacity:.15;
z-index:999;
background:url("https://www.transparenttextures.com/patterns/asfalt-light.png");
animation:grain .3s infinite;
}
@keyframes grain{
0%{transform:translate(0,0);}
50%{transform:translate(2%,-2%);}
100%{transform:translate(-2%,2%);}
}

/* 🌑 vignette */
.vignette{
position:fixed;
width:100%;height:100%;
box-shadow:inset 0 0 120px rgba(0,0,0,.4);
z-index:998;
pointer-events:none;
}
</style>
</head>

<body>

<div class="main-scene">

    <div class="gift-box" onclick="openGift()">
        <div class="lid"></div>
        <div class="box"></div>
    </div>

    <div class="envelope">
        <div class="flap"></div>
        <div class="letter">
            <h2>For My Jeppyy 💖</h2>
            <div id="message"></div>
        </div>
    </div>

    <div class="photostrip">
        <img src="jef1.jpeg">
        <img src="jef2.jpeg">
        <img src="jef3.jpeg">
    </div>

</div>

<audio id="bgMusic" loop preload="auto">
    <source src="./music.mp3" type="audio/mpeg">
</audio>

<div class="vignette"></div>
<div class="film-grain"></div>

<script>
/* particles */
setInterval(()=>{
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},200);

/* 💌 emotional message */
const text=`Happy Birthday my love 💖

From the moment you came into my life,
everything felt softer, warmer, and more beautiful ✨

You are not just someone I love…
you are my peace, my happiness,
and my favorite place to be 💕

Every smile of yours means the world to me,
and every moment with you is something I cherish deeply 💌

I hope today reminds you how incredibly special you are,
not just to the world…
but to me 💖

I love you more than words can ever express,
today, tomorrow, and always 💕`;

/* typing */
let i=0;
function startTyping(){
let el=document.getElementById("message");
el.innerHTML="";
i=0;
function type(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(type,25);
}}
type();
}

/* 🎵 music */
function cinematicMusic(a){
a.volume=0;
a.currentTime=12;
a.play().catch(()=>{});
let v=0;
let fade=setInterval(()=>{
if(v<1){v+=0.02;a.volume=v;}
else clearInterval(fade);
},300);
}

/* 🎁 open */
function openGift(){
let g=document.querySelector(".gift-box");
let e=document.querySelector(".envelope");
let m=document.getElementById("bgMusic");

g.classList.add("opened");
cinematicMusic(m);

for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left="50%";
f.style.top="50%";
f.style.setProperty('--x',(Math.random()-0.5)*300+"px");
f.style.setProperty('--y',(Math.random()-0.5)*300+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

setTimeout(()=>{
g.style.display="none";
e.classList.add("show-envelope");

setTimeout(()=>{
e.classList.add("open");
startTyping();
startFireworks();
},800);

},900);
}

/* fireworks */
function startFireworks(){
setInterval(()=>{
for(let i=0;i<12;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
f.style.setProperty('--x',(Math.random()-0.5)*200+"px");
f.style.setProperty('--y',(Math.random()-0.5)*200+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
},1200);
}
</script>

</body>
</html>
